<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in3pida Suite — Accedi</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root{
        --magenta:#d82d6b; --magenta2:#bd2059; --cyan:#009bb9; --cyan2:#0088a2;
        --ink:#181834; --grey:#6b6b85; --white:#fff; --border:#ececf2;
        --red-bg:#fee2e2; --red-text:#dc2626;
        --font:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        --display:'Anton',var(--font);
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:var(--font);color:var(--ink);min-height:100vh;background:#fff;
        background-image:
          radial-gradient(680px 420px at 8% 0%, rgba(216,45,107,.10), transparent 60%),
          radial-gradient(640px 460px at 96% 100%, rgba(0,155,185,.12), transparent 58%);
        display:flex;align-items:center;justify-content:center;padding:20px}
      .card{background:#fff;border:1px solid var(--border);border-radius:28px;box-shadow:0 24px 70px rgba(24,24,52,.12);
        padding:44px 40px 34px;width:100%;max-width:410px;text-align:center}
      .logo img{height:38px;object-fit:contain}
      .strip{height:30px;background:url(images/pattern.svg) repeat-x left center;background-size:auto 30px;border-radius:8px;margin:22px 0 4px}
      .title{font-family:var(--display);font-size:36px;letter-spacing:.01em;color:var(--magenta);text-transform:uppercase}
      .title em{color:var(--cyan);font-style:normal}
      .sub{font-size:13px;color:var(--grey);margin:10px 0 28px;font-weight:500}
      .group{margin-bottom:15px;text-align:left}
      .label{font-size:12px;font-weight:700;margin-bottom:7px;display:block}
      .in{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:14px;
        font-family:var(--font);font-weight:500;background:#fafafb;outline:none;transition:.15s}
      .in:focus{border-color:var(--magenta);background:#fff;box-shadow:0 0 0 4px rgba(216,45,107,.10)}
      .btn{width:100%;padding:14px;background:var(--magenta);color:#fff;border:none;border-radius:999em;
        font-size:14.5px;font-weight:800;cursor:pointer;font-family:var(--font);transition:.15s;margin-top:8px;letter-spacing:.02em}
      .btn:hover{background:var(--magenta2);transform:translateY(-1px);box-shadow:0 10px 26px rgba(216,45,107,.32)}
      .btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
      .link{background:none;border:none;color:var(--magenta);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);padding:0}
      .msg{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;text-align:left;font-weight:600}
      .msg-ok{background:#e6f9f0;color:#1a7a4a}
      .msg-err{background:var(--red-bg);color:var(--red-text)}
      .foot{margin-top:24px;font-size:11px;color:#b7b7c6;font-weight:600;letter-spacing:.04em}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><img src="images/logo.png" alt="in3pida"></div>
        <div class="strip"></div>
        <div class="title">la tua <em>suite</em></div>
        <div class="sub">Accedi al tuo hub di applicazioni</div>

        <div id="msg-ok" class="msg msg-ok" style="display:none"></div>
        <div id="msg-err" class="msg msg-err" style="display:none"></div>

        <form id="login-form">
            <div class="group"><label class="label" for="email">Email</label>
                <input type="email" class="in" id="email" placeholder="nome@in3pida.it" autocomplete="email" required></div>
            <div class="group">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
                    <label class="label" style="margin:0" for="password">Password</label>
                    <button type="button" id="btn-forgot" class="link">Password dimenticata?</button>
                </div>
                <input type="password" class="in" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button class="btn" type="submit" id="btn-login">Accedi</button>
        </form>
        <div class="foot">in3pida · suite.in3pida.it</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
    const _SB = window.supabase.createClient(
        'https://yyauvoqjdzrbmebeafit.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5YXV2b3FqZHpyYm1lYmVhZml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTM2MDAsImV4cCI6MjA5NTM2OTYwMH0.M6kD56PEO_UcJ68Vjquo03vuORjv62MflIzGLzYKN9w'
    );
    _SB.auth.getSession().then(({ data:{ session } }) => { if (session) window.location.href='index.html'; });
    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn=document.getElementById('btn-login'); btn.textContent='...'; btn.disabled=true; clr();
        const { error } = await _SB.auth.signInWithPassword({ email:document.getElementById('email').value.trim(), password:document.getElementById('password').value });
        if(error){ const m=(error.message.includes('Invalid login')||error.message.includes('invalid_credentials'))?'Email o password non corrette.':error.message.includes('Email not confirmed')?'Devi confermare la tua email prima di accedere.':error.message; msg('err',m); btn.textContent='Accedi'; btn.disabled=false; }
        else window.location.href='index.html';
    });
    document.getElementById('btn-forgot').addEventListener('click', async ()=>{
        const email=document.getElementById('email').value.trim();
        if(!email){ msg('err','Inserisci prima la tua email.'); return; }
        const b=document.getElementById('btn-forgot'); b.disabled=true; clr();
        const { error } = await _SB.auth.resetPasswordForEmail(email,{ redirectTo:'https://suite.in3pida.it/index.html' });
        b.disabled=false;
        if(error) msg('err',error.message); else msg('ok','Email inviata! Controlla la posta e clicca il link.');
    });
    function msg(t,x){const o=document.getElementById('msg-ok'),e=document.getElementById('msg-err');o.style.display='none';e.style.display='none';const el=t==='ok'?o:e;el.textContent=x;el.style.display='block';}
    function clr(){document.getElementById('msg-ok').style.display='none';document.getElementById('msg-err').style.display='none';}
    </script>
</body>
</html>
