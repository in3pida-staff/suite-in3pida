<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in3pida Suite — Accedi</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root{
        --magenta:#d82d6b; --magenta2:#b8235a; --cyan:#00bcd4;
        --navy:#181834; --navy2:#23234d;
        --white:#fff; --border:#e8e8e8; --grey:#6b6b85;
        --red-bg:#fee2e2; --red-text:#dc2626;
        --font:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:var(--font);color:var(--navy);min-height:100vh;
        background:var(--navy);
        background-image:
          radial-gradient(900px 500px at 12% 8%, rgba(216,45,107,.55), transparent 60%),
          radial-gradient(800px 600px at 88% 92%, rgba(0,188,212,.40), transparent 55%),
          linear-gradient(135deg,#14142e,#1d1d40);
        display:flex;align-items:center;justify-content:center;padding:20px}
      .login-card{background:var(--white);border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.45);
        padding:46px 40px 40px;width:100%;max-width:410px;text-align:center}
      .login-logo{margin-bottom:8px}
      .login-logo img{height:40px;object-fit:contain}
      .login-badge{display:inline-block;background:var(--cyan);color:#fff;font-size:11px;font-weight:800;
        padding:3px 11px;border-radius:30px;letter-spacing:.06em;text-transform:uppercase;margin-top:10px}
      .login-sub{font-size:13.5px;color:var(--grey);margin:18px 0 30px;font-weight:500}
      .form-group{margin-bottom:15px;text-align:left}
      .form-label{font-size:12px;font-weight:700;margin-bottom:7px;display:block;color:var(--navy)}
      .form-input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;
        font-family:var(--font);font-weight:500;background:#fafafb;outline:none;transition:.15s}
      .form-input:focus{border-color:var(--magenta);background:#fff;box-shadow:0 0 0 4px rgba(216,45,107,.10)}
      .btn-primary{width:100%;padding:14px;background:var(--magenta);color:#fff;border:none;border-radius:12px;
        font-size:14.5px;font-weight:800;cursor:pointer;font-family:var(--font);transition:.15s;margin-top:6px;letter-spacing:.01em}
      .btn-primary:hover{background:var(--magenta2);transform:translateY(-1px);box-shadow:0 8px 22px rgba(216,45,107,.35)}
      .btn-primary:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none}
      .btn-link{background:none;border:none;color:var(--magenta);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);padding:0}
      .login-msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:left;font-weight:500}
      .login-msg-success{background:#e6f9f0;color:#1a7a4a}
      .login-msg-error{background:var(--red-bg);color:var(--red-text)}
      .login-foot{margin-top:26px;font-size:11px;color:#aab;font-weight:600;letter-spacing:.03em}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><img src="images/logo.png" alt="in3pida"></div>
        <div><span class="login-badge">Suite</span></div>
        <div class="login-sub">Accedi al tuo hub di applicazioni</div>

        <div id="msg-success" class="login-msg login-msg-success" style="display:none"></div>
        <div id="msg-error"   class="login-msg login-msg-error"   style="display:none"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-input" id="email" placeholder="nome@in3pida.it" autocomplete="email" required>
            </div>
            <div class="form-group">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
                    <label class="form-label" style="margin:0" for="password">Password</label>
                    <button type="button" id="btn-forgot" class="btn-link">Password dimenticata?</button>
                </div>
                <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button class="btn-primary" type="submit" id="btn-login">Accedi</button>
        </form>
        <div class="login-foot">in3pida · suite.in3pida.it</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
    const _SB = window.supabase.createClient(
        'https://yyauvoqjdzrbmebeafit.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5YXV2b3FqZHpyYm1lYmVhZml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTM2MDAsImV4cCI6MjA5NTM2OTYwMH0.M6kD56PEO_UcJ68Vjquo03vuORjv62MflIzGLzYKN9w'
    );
    _SB.auth.getSession().then(({ data: { session } }) => { if (session) window.location.href = 'index.html'; });

    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        btn.textContent = '...'; btn.disabled = true; clearMsg();
        const { error } = await _SB.auth.signInWithPassword({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
        });
        if (error) {
            const msg = (error.message.includes('Invalid login')||error.message.includes('invalid_credentials')) ? 'Email o password non corrette.'
                : error.message.includes('Email not confirmed') ? 'Devi confermare la tua email prima di accedere.'
                : error.message;
            showMsg('error', msg); btn.textContent = 'Accedi'; btn.disabled = false;
        } else { window.location.href = 'index.html'; }
    });
    document.getElementById('btn-forgot').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) { showMsg('error', 'Inserisci prima la tua email.'); return; }
        const btn = document.getElementById('btn-forgot'); btn.disabled = true; clearMsg();
        const { error } = await _SB.auth.resetPasswordForEmail(email, { redirectTo: 'https://suite.in3pida.it/index.html' });
        btn.disabled = false;
        if (error) showMsg('error', error.message);
        else showMsg('success', 'Email inviata! Controlla la posta e clicca il link per reimpostare la password.');
    });
    function showMsg(t,x){const s=document.getElementById('msg-success'),e=document.getElementById('msg-error');s.style.display='none';e.style.display='none';const el=t==='success'?s:e;el.textContent=x;el.style.display='block';}
    function clearMsg(){document.getElementById('msg-success').style.display='none';document.getElementById('msg-error').style.display='none';}
    </script>
</body>
</html>
