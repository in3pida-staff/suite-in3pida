<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in3pida Suite</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://yyauvoqjdzrbmebeafit.supabase.co">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root{
        --magenta:#d82d6b; --magenta2:#bd2059; --cyan:#009bb9; --cyan2:#0088a2;
        --ink:#181834; --grey:#6b6b85; --white:#fff; --bg:#fff; --border:#ececf2;
        --green-text:#16a34a; --red-bg:#fee2e2; --red-text:#dc2626;
        --font:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        --display:'Anton',var(--font);
      }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:var(--font);color:#fff;min-height:100vh;
        background-color:#d82d6b;
        background-image:url(images/letto.svg);
        background-repeat:no-repeat;
        background-position:right -270px bottom 20px;
        background-size:680px auto;
        background-attachment:fixed}

      /* NAVBAR */
      .navbar{height:64px;background:transparent;position:sticky;top:0;z-index:50}
      .nav-inner{max-width:1120px;margin:0 auto;height:100%;padding:0 26px;display:flex;align-items:center;justify-content:space-between}
      .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
      .nav-logo img{height:28px;object-fit:contain}
      .nav-logo .badge{background:#fff;color:var(--magenta);font-size:10px;font-weight:800;padding:3px 11px;border-radius:999em;text-transform:uppercase;letter-spacing:.06em}
      .nav-right{display:flex;align-items:center;position:relative}
      .user-pill{display:flex;align-items:center;gap:11px;cursor:pointer;padding:6px 10px 6px 6px;border-radius:999em;transition:.15s}
      .user-pill:hover{background:rgba(255,255,255,.15)}
      .avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.85);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;overflow:hidden;flex-shrink:0}
      .avatar img{width:100%;height:100%;object-fit:cover}
      .user-meta{display:flex;flex-direction:column;line-height:1.25}
      .user-name{font-size:13px;font-weight:700;color:#fff}
      .user-sub{font-size:11px;color:rgba(255,255,255,.8);font-weight:600}
      .dd{position:absolute;top:56px;right:0;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 14px 44px rgba(24,24,52,.16);min-width:230px;overflow:hidden;display:none;z-index:60}
      .dd-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
      .dd-email{font-size:11.5px;color:var(--grey);word-break:break-all;font-weight:600}
      .dd-item{width:100%;text-align:left;padding:13px 18px;background:none;border:none;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:11px}
      .dd-item:hover{background:#f6f6fb}
      .dd-item.logout{color:var(--red-text)}
      .dd-item svg{width:16px;height:16px}

      /* HEADER pagina */
      .wrap{max-width:1120px;margin:0 auto;padding:0 26px}
      .head{padding:40px 0 26px}
      .hi{font-size:13px;font-weight:800;color:rgba(255,255,255,.92);margin-bottom:8px;text-transform:uppercase;letter-spacing:.12em}
      .h1{font-family:var(--display);font-size:92px;line-height:.94;text-transform:uppercase;letter-spacing:.012em;color:#fff}
      .h1 .dot{display:inline-block;width:.15em;height:.15em;border-radius:50%;background:var(--cyan);vertical-align:baseline;margin-left:.05em}
      .lead{font-size:14px;color:rgba(255,255,255,.92);margin-top:12px;font-weight:500}

      /* GRID */
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:44px;padding-bottom:80px}
      .card{background:linear-gradient(180deg,#ec79a4 0%,#cf2a63 100%);border:2px solid #fff;border-radius:28px;padding:20px;text-align:left;transition:transform .16s,filter .16s;position:relative;display:flex;flex-direction:column;aspect-ratio:1;overflow:hidden}
      .card.clickable{cursor:pointer}
      .card.clickable:hover{transform:translateY(-4px);filter:brightness(1.08)}
      .ico{width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
      .ico svg{width:22px;height:22px;stroke:var(--cyan);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .card-label{font-family:var(--display);font-size:22px;font-weight:400;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase;color:#fff;line-height:1.05}
      .card-desc{font-size:11.5px;color:rgba(255,255,255,.85);line-height:1.4;font-weight:500}
      .card-badge{position:absolute;top:13px;right:13px;font-size:8.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999em}
      .badge-soon{background:rgba(255,255,255,.25);color:#fff}
      .badge-admin{background:#fff;color:var(--magenta)}
      .card.soon{opacity:.6}
      .card.soon .ico{background:rgba(255,255,255,.55)}

      .empty{text-align:center;padding:60px 20px;color:var(--grey);font-weight:600;grid-column:1/-1}
      .empty-ico{font-size:40px;margin-bottom:12px}

      /* ADMIN */
      .back-link{background:none;border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);padding:8px 0;margin-bottom:2px}
      .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
      .input{padding:12px 15px;border:1.5px solid var(--border);border-radius:14px;font-size:13px;font-weight:500;font-family:var(--font);background:#fff;outline:none}
      .input:focus{border-color:var(--magenta);box-shadow:0 0 0 3px rgba(216,45,107,.08)}
      .btn{padding:12px 18px;border-radius:999em;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);border:none;transition:.15s}
      .btn-primary{background:var(--magenta);color:#fff}
      .btn-primary:hover{background:var(--magenta2)}
      .btn-danger{background:#fff;border:1.5px solid var(--red-text);color:var(--red-text)}
      .btn-danger:hover{background:var(--red-bg)}
      table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden}
      th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);padding:14px 18px;background:#fafafc;border-bottom:1px solid var(--border);font-weight:800}
      td{padding:14px 18px;font-size:13px;font-weight:500;border-bottom:1px solid #f1f1f6}
      tr:last-child td{border-bottom:none}
      tr.row-click{cursor:pointer}
      tr.row-click:hover td{background:#fafaff}
      .u-cell{display:flex;align-items:center;gap:11px}
      .u-av{width:36px;height:36px;border-radius:50%;background:var(--cyan);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;overflow:hidden;flex-shrink:0}
      .u-av img{width:100%;height:100%;object-fit:cover}
      .pill{display:inline-block;background:rgba(0,155,185,.13);color:var(--cyan2);font-size:11px;font-weight:800;padding:4px 12px;border-radius:999em}
      .perm-app{border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:13px;background:#fff}
      .perm-head{display:flex;align-items:center;gap:13px}
      .perm-ico{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
      .perm-ico svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .perm-label{font-size:15px;font-weight:800;flex:1}
      .switch{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;cursor:pointer}
      .perm-body{margin-top:15px;padding-top:15px;border-top:1px solid #f1f1f6;display:none}
      .perm-body.open{display:block}
      .perm-row{display:flex;align-items:center;gap:11px;margin-bottom:12px}
      .perm-row label{font-size:13px;font-weight:700}
      .features-box{margin-top:8px;display:none}
      .features-box.open{display:block}
      .features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-top:9px}
      .feat{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;background:#f6f6fb;padding:9px 12px;border-radius:11px;cursor:pointer}
      .save-bar{position:sticky;bottom:0;background:linear-gradient(transparent,#fff 34%);padding:22px 0;display:flex;gap:10px;justify-content:flex-end}

      /* MODALE */
      .overlay{position:fixed;inset:0;background:rgba(24,24,52,.45);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
      .overlay.open{display:flex}
      .modal{background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.4);width:100%;max-width:420px;overflow:hidden}
      .modal-head{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
      .modal-head h3{font-family:var(--display);font-size:20px;text-transform:uppercase;letter-spacing:.01em}
      .modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--grey);line-height:1}
      .modal-body{padding:22px}
      .pf-avsec{display:flex;align-items:center;gap:16px;margin-bottom:20px}
      .pf-av{width:74px;height:74px;border-radius:50%;background:var(--magenta);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:27px;overflow:hidden;flex-shrink:0}
      .pf-av img{width:100%;height:100%;object-fit:cover}
      .btn-upload{display:inline-block;background:#f3f3f8;border:1px solid var(--border);padding:9px 15px;border-radius:999em;font-size:12.5px;font-weight:700;cursor:pointer}
      .btn-upload:hover{border-color:var(--magenta);color:var(--magenta)}
      .pf-field{margin-bottom:14px}
      .pf-label{font-size:12px;font-weight:700;display:block;margin-bottom:6px}
      .pf-input{width:100%;padding:12px 15px;border:1.5px solid var(--border);border-radius:14px;font-size:14px;font-weight:500;font-family:var(--font);outline:none}
      .pf-input:focus{border-color:var(--magenta)}
      .pf-input:disabled{background:#fafafb;color:var(--grey)}
      .pf-actions{display:flex;justify-content:flex-end;margin-top:6px}

      /* SPINNER apertura app */
      #opening{position:fixed;inset:0;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;gap:18px}
      #opening.show{display:flex}
      .spin{width:46px;height:46px;border:4px solid #f0e3ea;border-top-color:var(--magenta);border-radius:50%;animation:sp .7s linear infinite}
      @keyframes sp{to{transform:rotate(360deg)}}
      #opening .lbl{font-family:var(--display);font-size:20px;text-transform:uppercase;color:var(--ink)}

      .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 24px;border-radius:999em;font-size:13px;font-weight:700;box-shadow:0 10px 34px rgba(0,0,0,.28);opacity:0;transition:.2s;pointer-events:none;z-index:300}
      .toast.show{opacity:1}
      .notice{background:#fff;border:1px solid var(--border);border-radius:18px;padding:24px;font-size:13px;color:var(--grey);line-height:1.6;font-weight:500}
      .notice code{background:#f1f1f6;padding:2px 8px;border-radius:6px;font-size:12px;color:var(--ink)}
    </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo" id="logo-home"><img src="images/logo-bianco.png" alt="in3pida"><span class="badge">suite</span></div>
      <div class="nav-right">
        <div class="user-pill" id="user-pill">
          <div class="avatar" id="nav-avatar">U</div>
          <div class="user-meta"><div class="user-name" id="nav-name">Utente</div><div class="user-sub" id="nav-role">—</div></div>
        </div>
        <div class="dd" id="dropdown">
          <div class="dd-head"><div class="avatar" id="dd-avatar" style="width:40px;height:40px">U</div>
            <div><div class="user-name" id="dd-name">Utente</div><div class="dd-email" id="dd-email"></div></div></div>
          <button class="dd-item" id="dd-profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg> Modifica profilo</button>
          <button class="dd-item logout" id="dd-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Esci</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- HOME -->
  <div class="wrap" id="view-home">
    <div class="head">
      <div class="hi" id="greet">ciao!</div>
      <div class="h1">le tue app<span class="dot"></span></div>
      <div class="lead">Scegli un'app per accedere. L'accesso è automatico: non devi rifare il login.</div>
    </div>
    <div class="grid" id="app-grid"></div>
  </div>

  <!-- UTENTI -->
  <div class="wrap" id="view-users" style="display:none">
    <div class="head" style="padding-bottom:18px">
      <button class="back-link" id="users-back">← Torna alle app</button>
      <div class="h1">gestione <em>utenti</em></div>
      <div class="lead">Assegna le applicazioni e le funzionalità visibili a ciascun utente.</div>
    </div>
    <div class="toolbar">
      <input class="input" id="new-email" type="email" placeholder="email@esempio.it" style="min-width:250px">
      <button class="btn btn-primary" id="btn-add">+ Aggiungi utente</button>
    </div>
    <div id="users-content"></div>
  </div>

  <!-- DETTAGLIO -->
  <div class="wrap" id="view-detail" style="display:none">
    <div class="head" style="padding-bottom:18px">
      <button class="back-link" id="detail-back">← Torna agli utenti</button>
      <div class="h1" id="detail-title" style="font-size:30px">permessi</div>
      <div class="lead" id="detail-sub"></div>
    </div>
    <div id="detail-apps"></div>
    <div class="save-bar">
      <button class="btn btn-danger" id="btn-remove">Rimuovi utente</button>
      <button class="btn btn-primary" id="btn-save">Salva permessi</button>
    </div>
  </div>

  <!-- MODALE PROFILO -->
  <div class="overlay" id="profile-overlay">
    <div class="modal">
      <div class="modal-head"><h3>profilo</h3><button class="modal-x" id="profile-close">✕</button></div>
      <div class="modal-body">
        <div class="pf-avsec">
          <div class="pf-av" id="pf-av">U</div>
          <div><label class="btn-upload" for="pf-file">Cambia foto</label>
            <input type="file" id="pf-file" accept="image/*" style="display:none">
            <div style="font-size:11px;color:var(--grey);margin-top:7px;font-weight:600">JPG o PNG — quadrata è meglio</div></div>
        </div>
        <div class="pf-field"><label class="pf-label">Nome e cognome</label><input type="text" id="pf-name" class="pf-input" placeholder="Mario D'Amore"></div>
        <div class="pf-field"><label class="pf-label">Email</label><input type="email" id="pf-email" class="pf-input" disabled></div>
        <div id="pf-msg" style="font-size:12.5px;margin:4px 0 12px;display:none;font-weight:600"></div>
        <div class="pf-actions"><button class="btn btn-primary" id="pf-save">Salva</button></div>
      </div>
    </div>
  </div>

  <div id="opening"><div class="spin"></div><div class="lbl" id="opening-lbl">Apertura…</div></div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  const SUPABASE_URL='https://yyauvoqjdzrbmebeafit.supabase.co';
  const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5YXV2b3FqZHpyYm1lYmVhZml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTM2MDAsImV4cCI6MjA5NTM2OTYwMH0.M6kD56PEO_UcJ68Vjquo03vuORjv62MflIzGLzYKN9w';
  const ADMIN_EMAIL='mario@in3pida.it';
  const _SB=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

  const APPS=[
    { id:'monitoring',    label:'in3pida Form',          url:'https://monitoring.in3pida.it', tint:'#d82d6b', description:'Monitoring plugin e siti', features:['statistiche','crm','impostazioni','semafori','date_chiuse','minimum_stay'] },
    { id:'geo',           label:'GEO',                   url:'https://isi.in3pida.it',        tint:'#009bb9', description:'Sito Intelligente AI',     features:['benchmark','utenti','aggiornamenti'] },
    { id:'smart-working', label:'Smart Working',         url:'',                              tint:'#009bb9', description:'Gestione lavoro',         features:[] },
    { id:'bi',            label:'Business Intelligence',  url:'',                             tint:'#d82d6b', description:'Analisi dati hotel',      features:[] },
  ];
  const ICONS={
    'monitoring':'<path d="M9 3h6l1 4H8l1-4z"/><rect x="5" y="7" width="14" height="14" rx="2"/><path d="M9 12h6M9 16h4"/>',
    'geo':'<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/>',
    'smart-working':'<rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M3 13h18"/>',
    'bi':'<path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="3" height="5"/><rect x="12" y="8" width="3" height="9"/><rect x="17" y="5" width="3" height="12"/>',
    'users':'<circle cx="9" cy="8" r="3.4"/><path d="M3.5 20a5.5 5.5 0 0111 0"/><path d="M16 5.3a3 3 0 010 5.8"/><path d="M21 20a5 5 0 00-4-4.9"/>',
  };
  const svgIcon=id=>`<svg viewBox="0 0 24 24">${ICONS[id]||'<circle cx="12" cy="12" r="6"/>'}</svg>`;
  const FEATURE_LABELS={statistiche:'Statistiche',crm:'CRM',impostazioni:'Impostazioni',semafori:'Semafori',date_chiuse:'Date chiuse',minimum_stay:'Minimum stay',benchmark:'Benchmark',utenti:'Utenti',aggiornamenti:'Aggiornamenti'};
  const ROLES=['user','admin','superadmin','custom'];
  const featLabel=f=>FEATURE_LABELS[f]||f;
  const roleLabel=r=>({user:'Utente',admin:'Admin',superadmin:'Superadmin',custom:'Personalizzato'}[r]||r);

  let ME=null, IS_ADMIN=false, MY_PERMS={};

  // ─── INIT (primo paint immediato, dati in parallelo) ──────────────────────
  (async()=>{
    const { data:{ session } } = await _SB.auth.getSession();
    if(!session){ window.location.href='login.html'; return; }
    ME=session.user;
    IS_ADMIN=(ME.email||'').toLowerCase()===ADMIN_EMAIL;
    paintUser();
    // avvia la query MA non bloccare il primo render
    const permsPromise=_SB.from('suite_permissions').select('*').eq('user_id',ME.id);
    renderHome();                       // admin vede subito tutto → istantaneo
    const { data:perms }=await permsPromise;
    (perms||[]).forEach(p=>MY_PERMS[p.app_id]=p);
    if(!IS_ADMIN) renderHome();         // utente: aggiorna con i permessi reali
  })();

  function paintUser(){
    const name=ME.user_metadata?.full_name||(ME.email||'').split('@')[0];
    const ini=(name[0]||'U').toUpperCase();
    const av=ME.user_metadata?.avatar_url;
    document.getElementById('nav-name').textContent=name;
    document.getElementById('nav-role').textContent=IS_ADMIN?'Amministratore':'Utente';
    document.getElementById('dd-name').textContent=name;
    document.getElementById('dd-email').textContent=ME.email||'';
    document.getElementById('greet').textContent='ciao '+name.split(' ')[0]+'!';
    ['nav-avatar','dd-avatar'].forEach(id=>{ const el=document.getElementById(id); el.innerHTML=av?`<img src="${av}" alt="">`:ini; });
  }

  function renderHome(){
    const grid=document.getElementById('app-grid');
    let cards=[];
    APPS.forEach(app=>{
      const visible=IS_ADMIN||(MY_PERMS[app.id]&&MY_PERMS[app.id].visible);
      if(!visible) return;
      const soon=!app.url;
      cards.push(`<div class="card ${soon?'soon':'clickable'}" ${soon?'':`data-app="${app.id}"`}>
        ${soon?'<span class="card-badge badge-soon">Prossimamente</span>':''}
        <div class="ico">${svgIcon(app.id)}</div>
        <div class="card-label">${esc(app.label)}</div>
        <div class="card-desc">${esc(app.description)}</div></div>`);
    });
    if(IS_ADMIN) cards.push(`<div class="card clickable" data-admin="users">
      <span class="card-badge badge-admin">Admin</span>
      <div class="ico">${svgIcon('users')}</div>
      <div class="card-label">Utenti</div>
      <div class="card-desc">Gestisci accessi e funzionalità degli utenti</div></div>`);
    if(!cards.length){ grid.innerHTML=`<div class="empty"><div class="empty-ico">🔒</div><div>Non hai ancora nessuna app assegnata.<br>Contatta l'amministratore.</div></div>`; return; }
    grid.innerHTML=cards.join('');
    grid.querySelectorAll('[data-app]').forEach(el=>el.onclick=()=>openApp(el.dataset.app));
    grid.querySelectorAll('[data-admin="users"]').forEach(el=>el.onclick=openUsers);
  }

  // ─── SSO con feedback "Apertura…" ─────────────────────────────────────────
  async function openApp(appId){
    const app=APPS.find(a=>a.id===appId);
    if(!app||!app.url) return;
    document.getElementById('opening-lbl').textContent='Apertura '+app.label+'…';
    document.getElementById('opening').classList.add('show');
    const { data:{ session } }=await _SB.auth.getSession();
    if(!session){ window.location.href='login.html'; return; }
    const frag=`access_token=${session.access_token}&refresh_token=${session.refresh_token}&expires_in=3600&token_type=bearer&type=login`;
    window.location.href=app.url.replace(/\/$/,'')+'/#'+frag;
  }

  // ─── DROPDOWN / PROFILO ───────────────────────────────────────────────────
  document.getElementById('user-pill').onclick=e=>{ e.stopPropagation(); const d=document.getElementById('dropdown'); d.style.display=d.style.display==='block'?'none':'block'; };
  document.addEventListener('click',()=>document.getElementById('dropdown').style.display='none');
  document.getElementById('logo-home').onclick=()=>showView('home');
  document.getElementById('dd-logout').onclick=async()=>{ await _SB.auth.signOut(); window.location.href='login.html'; };
  document.getElementById('dd-profile').onclick=()=>{
    document.getElementById('pf-name').value=ME.user_metadata?.full_name||'';
    document.getElementById('pf-email').value=ME.email||'';
    const av=ME.user_metadata?.avatar_url;
    document.getElementById('pf-av').innerHTML=av?`<img src="${av}">`:(ME.email||'U')[0].toUpperCase();
    document.getElementById('pf-msg').style.display='none';
    document.getElementById('profile-overlay').classList.add('open');
  };
  document.getElementById('profile-close').onclick=()=>document.getElementById('profile-overlay').classList.remove('open');
  document.getElementById('profile-overlay').onclick=e=>{ if(e.target.id==='profile-overlay') e.currentTarget.classList.remove('open'); };
  document.getElementById('pf-file').onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ const img=new Image(); img.onload=async()=>{
      const S=200,c=document.createElement('canvas'); c.width=S; c.height=S; const ctx=c.getContext('2d');
      const m=Math.min(img.width,img.height),sx=(img.width-m)/2,sy=(img.height-m)/2;
      ctx.drawImage(img,sx,sy,m,m,0,0,S,S);
      const dataUrl=c.toDataURL('image/jpeg',0.8);
      document.getElementById('pf-av').innerHTML=`<img src="${dataUrl}">`;
      const { error }=await _SB.auth.updateUser({ data:{ avatar_url:dataUrl } });
      if(error){ pfMsg('error','Errore foto: '+error.message); return; }
      const { data:{ user } }=await _SB.auth.getUser(); ME=user; paintUser(); pfMsg('ok','Foto aggiornata ✓');
    }; img.src=ev.target.result; };
    reader.readAsDataURL(file);
  };
  document.getElementById('pf-save').onclick=async()=>{
    const name=document.getElementById('pf-name').value.trim();
    const btn=document.getElementById('pf-save'); btn.disabled=true; btn.textContent='...';
    const { error }=await _SB.auth.updateUser({ data:{ full_name:name } });
    btn.disabled=false; btn.textContent='Salva';
    if(error){ pfMsg('error',error.message); return; }
    const { data:{ user } }=await _SB.auth.getUser(); ME=user; paintUser(); pfMsg('ok','Profilo salvato ✓');
    setTimeout(()=>document.getElementById('profile-overlay').classList.remove('open'),700);
  };
  function pfMsg(t,x){ const e=document.getElementById('pf-msg'); e.style.display='block'; e.style.color=t==='ok'?'#16a34a':'#dc2626'; e.textContent=x; }

  // ─── VISTE ────────────────────────────────────────────────────────────────
  function showView(v){
    document.getElementById('view-home').style.display=v==='home'?'block':'none';
    document.getElementById('view-users').style.display=v==='users'?'block':'none';
    document.getElementById('view-detail').style.display=v==='detail'?'block':'none';
    window.scrollTo(0,0);
  }
  document.getElementById('users-back').onclick=()=>showView('home');
  document.getElementById('detail-back').onclick=()=>openUsers();

  // ─── GESTIONE UTENTI ──────────────────────────────────────────────────────
  let ALL_USERS=[], ALL_PERMS=[], USER_META={};
  async function adminFetch(method,body){
    const { data:{ session } }=await _SB.auth.getSession();
    const resp=await fetch(`${SUPABASE_URL}/functions/v1/suite-admin-users`,{ method, headers:{ 'Authorization':`Bearer ${session.access_token}`,'Content-Type':'application/json' }, body:body?JSON.stringify(body):undefined });
    if(!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error||resp.statusText);
    return resp.json();
  }
  async function openUsers(){
    if(!IS_ADMIN) return;
    showView('users');
    const box=document.getElementById('users-content'); box.innerHTML=`<div class="notice">Caricamento utenti…</div>`;
    try{
      ALL_USERS=await adminFetch('GET'); ALL_USERS.forEach(u=>USER_META[u.id]=u);
      const { data:perms }=await _SB.from('suite_permissions').select('*'); ALL_PERMS=perms||[];
      renderUsersTable();
    }catch(e){
      box.innerHTML=`<div class="notice"><strong>Gestione utenti non ancora attiva.</strong><br>Per abilitarla, deploya la Edge Function:<br><br><code>supabase functions deploy suite-admin-users</code><br><br>Dettaglio: ${esc(e.message)}</div>`;
    }
  }
  function renderUsersTable(){
    const box=document.getElementById('users-content');
    if(!ALL_USERS.length){ box.innerHTML=`<div class="notice">Nessun utente registrato.</div>`; return; }
    const rows=ALL_USERS.map(u=>{
      const n=ALL_PERMS.filter(p=>p.user_id===u.id&&p.visible).length;
      const name=u.user_metadata?.full_name||(u.email||'').split('@')[0];
      const av=u.user_metadata?.avatar_url; const ini=(name[0]||'U').toUpperCase();
      const last=u.last_sign_in_at?new Date(u.last_sign_in_at).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'Mai';
      return `<tr class="row-click" data-uid="${u.id}"><td><div class="u-cell"><div class="u-av">${av?`<img src="${av}">`:ini}</div><div><div style="font-weight:700">${esc(name)}</div><div style="font-size:11.5px;color:var(--grey)">${esc(u.email)}</div></div></div></td><td><span class="pill">${n} app</span></td><td style="color:var(--grey)">${last}</td></tr>`;
    }).join('');
    box.innerHTML=`<table><thead><tr><th>Utente</th><th>App assegnate</th><th>Ultimo accesso</th></tr></thead><tbody>${rows}</tbody></table>`;
    box.querySelectorAll('[data-uid]').forEach(r=>r.onclick=()=>openDetail(r.dataset.uid));
  }
  let DETAIL_UID=null;
  function openDetail(uid){
    DETAIL_UID=uid; const u=USER_META[uid];
    const up={}; ALL_PERMS.filter(p=>p.user_id===uid).forEach(p=>up[p.app_id]=p);
    const name=u?.user_metadata?.full_name||(u?.email||'').split('@')[0];
    document.getElementById('detail-title').textContent=name||'permessi';
    document.getElementById('detail-sub').textContent=(u?.email||'')+' — spunta le app visibili, scegli il ruolo e (se "personalizzato") le funzionalità.';
    document.getElementById('detail-apps').innerHTML=APPS.map(app=>{
      const p=up[app.id]||{}; const checked=p.visible?'checked':''; const role=p.role||'user'; const feats=p.features||{};
      const fc=app.features.map(f=>`<label class="feat"><input type="checkbox" data-feat="${f}" ${feats[f]?'checked':''}> ${featLabel(f)}</label>`).join('');
      return `<div class="perm-app" data-app="${app.id}"><div class="perm-head"><div class="perm-ico" style="background:${app.tint}">${svgIcon(app.id)}</div><span class="perm-label">${esc(app.label)}</span><label class="switch"><input type="checkbox" class="vis-toggle" ${checked}> App visibile</label></div><div class="perm-body ${checked?'open':''}"><div class="perm-row"><label>Ruolo</label><select class="input role-sel">${ROLES.map(r=>`<option value="${r}" ${r===role?'selected':''}>${roleLabel(r)}</option>`).join('')}</select></div>${app.features.length?`<div class="features-box ${role==='custom'?'open':''}"><label style="font-size:12px;font-weight:700;color:var(--grey)">Funzionalità disponibili</label><div class="features-grid">${fc}</div></div>`:''}</div></div>`;
    }).join('');
    document.querySelectorAll('.perm-app').forEach(card=>{
      const body=card.querySelector('.perm-body');
      card.querySelector('.vis-toggle').onchange=e=>body.classList.toggle('open',e.target.checked);
      const rs=card.querySelector('.role-sel'),fb=card.querySelector('.features-box');
      if(rs&&fb) rs.onchange=e=>fb.classList.toggle('open',e.target.value==='custom');
    });
    showView('detail');
  }
  document.getElementById('btn-save').onclick=async()=>{
    const rows=[];
    document.querySelectorAll('.perm-app').forEach(card=>{ const features={}; card.querySelectorAll('[data-feat]').forEach(cb=>features[cb.dataset.feat]=cb.checked); rows.push({ user_id:DETAIL_UID, app_id:card.dataset.app, visible:card.querySelector('.vis-toggle').checked, role:card.querySelector('.role-sel')?.value||'user', features, updated_at:new Date().toISOString() }); });
    const btn=document.getElementById('btn-save'); btn.disabled=true; btn.textContent='Salvataggio…';
    const { error }=await _SB.from('suite_permissions').upsert(rows,{ onConflict:'user_id,app_id' });
    btn.disabled=false; btn.textContent='Salva permessi';
    if(error){ toast('Errore: '+error.message); return; }
    toast('Permessi salvati ✓');
    const { data:perms }=await _SB.from('suite_permissions').select('*'); ALL_PERMS=perms||[];
  };
  document.getElementById('btn-remove').onclick=async()=>{
    const u=USER_META[DETAIL_UID];
    if(!confirm(`Rimuovere tutti i permessi di ${u?.email}?\n(L'account di accesso NON viene eliminato.)`)) return;
    const { error }=await _SB.from('suite_permissions').delete().eq('user_id',DETAIL_UID);
    if(error){ toast('Errore: '+error.message); return; }
    toast('Permessi rimossi ✓'); await openUsers();
  };
  document.getElementById('btn-add').onclick=()=>{
    const email=document.getElementById('new-email').value.trim().toLowerCase();
    if(!email){ toast('Inserisci un\'email'); return; }
    const found=ALL_USERS.find(u=>(u.email||'').toLowerCase()===email);
    if(!found){ toast('Nessun account con questa email. Crealo prima in Supabase Auth.'); return; }
    document.getElementById('new-email').value=''; openDetail(found.id);
  };

  function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  let toastTimer;
  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
  </script>
</body>
</html>
